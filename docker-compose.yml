services:
  postgres:
    image: postgres:17-alpine
    container_name: devroast-db
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: devroast
      POSTGRES_PASSWORD: devroast
      POSTGRES_DB: devroast
    volumes:
      - devroast-data:/var/lib/postgresql/data

volumes:
  devroast-data:
